  .wrap { padding: 12px 0 20px; font-size: 13px; color: var(--color-text-primary); }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .filter-btn { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; transition: all .15s; }
  .filter-btn.active, .filter-btn:hover { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
  .search-box { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); font-size: 12px; outline: none; min-width: 160px; }
  .search-box::placeholder { color: var(--color-text-tertiary); }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 10px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--color-border-secondary); cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--color-text-primary); }
  td { padding: 7px 8px; border-bottom: 1px solid var(--color-border-tertiary); vertical-align: middle; line-height: 1.3; }
  tr:last-child td { border-bottom: none; }
  tr.april-row td { background: rgba(250,195,80,0.06); }
  .artist { font-weight: 500; font-size: 13px; }
  .song { color: var(--color-text-secondary); font-size: 12px; margin-top: 1px; }
  .genre-pill { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .g-club  { background: #E1F5EE; color: #085041; }
  .g-rb    { background: #EEEDFE; color: #3C3489; }
  .g-rock  { background: #FAECE7; color: #712B13; }
  .g-alt   { background: #FAEEDA; color: #633806; }
  .tag-april { display:inline-block; font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 8px; background: #FAC775; color: #412402; white-space:nowrap; }
  .yt-link { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; color: var(--color-text-info); text-decoration: none; padding: 3px 8px; border-radius: 8px; border: 1px solid var(--color-border-info, var(--color-border-secondary)); white-space: nowrap; }
  .yt-link:hover { background: var(--color-background-info); }
  .date-cell { font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; }
  .empty { text-align: center; color: var(--color-text-tertiary); padding: 24px; }
  .count { font-size: 11px; color: var(--color-text-tertiary); margin-top: 8px; }
</style>
<div class="wrap">

  <table>

    <tbody id="tbody"></tbody>
  </table>
  <div class="count" id="count"></div>
</div>

function fmtDate(d) {
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m)-1] + ' ' + parseInt(day) + ', ' + y;
}

let currentFilter = 'all';
let sortKey = 'rank';
let sortDir = 1;

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  render();
}

function genreClass(g) {
  return {Club:'g-club','Club/Dance':'g-club','R&B':'g-rb','Rock':'g-rock','Alt/Indie':'g-alt'}[g] || 'g-alt';
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let data = ALL.filter(r => {
    if (currentFilter === 'april') return r.april;
    if (currentFilter !== 'all' && r.genre !== currentFilter) return false;
    if (q && !r.artist.toLowerCase().includes(q) && !r.song.toLowerCase().includes(q)) return false;
    return true;
  });
  data.sort((a, b) => {
    let av = sortKey === 'date' ? a.date : (sortKey === 'rank' ? a.rank : a[sortKey]);
    let bv = sortKey === 'date' ? b.date : (sortKey === 'rank' ? b.rank : b[sortKey]);
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
  const tbody = document.getElementById('tbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No results.</td></tr>';
  } else {
    tbody.innerHTML = data.map((r, i) => `
      <tr class="${r.april ? 'april-row' : ''}">
        <td style="font-size:11px;color:var(--color-text-tertiary);font-weight:500;min-width:20px">${i+1}</td>
        <td>
          <div class="artist">${r.artist}</div>
          <div class="song">${r.song}${r.april ? ' <span class="tag-april">APR 2008</span>' : ''}</div>
        </td>
        <td class="date-cell">${fmtDate(r.date)}</td>
        <td><span class="genre-pill ${genreClass(r.genre)}">${r.genre}</span></td>
        <td><a class="yt-link" href="${yt(r.artist, r.song)}" target="_blank">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
          Watch
        </a></td>
      </tr>`).join('');
  }
  document.getElementById('count').textContent = `${data.length} track${data.length !== 1 ? 's' : ''}`;
}
render();
